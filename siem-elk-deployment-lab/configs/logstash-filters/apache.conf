# Apache Web Server Filter Configuration
# Parses Apache Combined Log Format and detects common attacks

filter {
  # Skip non-Apache logs
  if [type] != "apache" {
    break
  }

  # Parse Apache Combined Log Format
  # Format: %h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"
  grok {
    match => {
      "message" => "%{COMBINEDAPACHELOG}"
    }
    remove_field => ["message"]
  }

  # Add missing fields if parsing succeeded
  if ![clientip] {
    mutate {
      add_tag => ["_grokparsefailure"]
    }
  }

  # Normalize field names for ECS (Elastic Common Schema)
  mutate {
    add_field => {
      "source.ip" => "%{clientip}"
      "source.address" => "%{clientip}"
      "http.request.method" => "%{verb}"
      "http.request.uri" => "%{request}"
      "http.response.status_code" => "%{response}"
      "http.response.body.bytes" => "%{bytes}"
      "http.request.referrer" => "%{referrer}"
      "user_agent.original" => "%{agent}"
    }
    remove_field => ["clientip", "verb", "request", "response", "bytes", "referrer", "agent", "ident", "auth"]
  }

  # Parse HTTP request line (method, path, query, protocol)
  grok {
    match => {
      "http.request.uri" => "(?<http_method>\S+) (?<http_path>[\w/-]*) (?<http_query>\S*)? HTTP/(?<http_version>\d\.\d)"
    }
  }

  mutate {
    add_field => {
      "http.request.method" => "%{http_method}"
      "http.request.path" => "%{http_path}"
      "http.request.query" => "%{http_query}"
      "http.version" => "%{http_version}"
    }
    remove_field => ["http_method", "http_path", "http_query", "http_version"]
  }

  # Convert response code to category
  if [http.response.status_code] =~ /^2\d{2}$/ {
    mutate {
      add_field => { "http.response.category" => "2xx_success" }
    }
  }
  else if [http.response.status_code] =~ /^3\d{2}$/ {
    mutate {
      add_field => { "http.response.category" => "3xx_redirect" }
    }
  }
  else if [http.response.status_code] =~ /^4\d{2}$/ {
    mutate {
      add_field => { "http.response.category" => "4xx_client_error" }
    }
  }
  else if [http.response.status_code] =~ /^5\d{2}$/ {
    mutate {
      add_field => { "http.response.category" => "5xx_server_error" }
    }
  }

  # SQL Injection Detection
  if [http.request.uri] =~ /(\bUNION\b|\bSELECT\b|\bDROP\b|\bDELETE\b|'|"|;|--|\*\/|\/\*)/ {
    mutate {
      add_field => { "is_sql_injection" => true }
      add_tag => ["sql_injection"]
    }
    
    # Extract SQL keywords
    mutate {
      add_field => { "sql_keywords" => [] }
    }
    
    if [http.request.uri] =~ /\bUNION\b/ { mutate { add_field => { "sql_keywords" => "UNION" } } }
    if [http.request.uri] =~ /\bSELECT\b/ { mutate { add_field => { "sql_keywords" => "SELECT" } } }
    if [http.request.uri] =~ /\bDROP\b/ { mutate { add_field => { "sql_keywords" => "DROP" } } }
  }

  # XSS (Cross-Site Scripting) Detection
  if [http.request.uri] =~ /(<script|javascript:|onerror|onload|onclick|alert|eval)/ {
    mutate {
      add_field => { "is_xss_attempt" => true }
      add_tag => ["xss_attempt"]
    }
  }

  # LFI (Local File Inclusion) Detection
  if [http.request.uri] =~ /(\.\.\/|\/\.\.\\|\.\.\\|%2e%2e|etc\/passwd|windows\/system)/ {
    mutate {
      add_field => { "is_lfi_attempt" => true }
      add_tag => ["lfi_attempt"]
    }
  }

  # Identify suspicious user agents
  if [user_agent.original] =~ /(sqlmap|nikto|nmap|masscan|nessus|metasploit|burp)/ {
    mutate {
      add_field => { "is_scanner" => true }
      add_tag => ["scanner_detected"]
    }
  }

  # Parse user agent for OS and browser
  useragent {
    source => "user_agent.original"
    target => "user_agent"
  }

  # Extract hostname from Host header if present
  if [http.request.referrer] {
    grok {
      match => { "http.request.referrer" => "(?<referrer_host>https?://(?<referrer_domain>[^/]+))" }
    }
  }

  # Calculate response time if available
  if [request_time] {
    mutate {
      convert => { "request_time" => "float" }
      add_field => { "http.response.time_ms" => "%{request_time}" }
    }
  }

  # Mark suspicious responses
  if [http.response.status_code] == "403" and [is_sql_injection] == true {
    mutate {
      add_field => { "security_event" => "SQL_INJECTION_BLOCKED" }
      add_field => { "severity" => "HIGH" }
    }
  }
  else if [http.response.status_code] == "403" and [is_xss_attempt] == true {
    mutate {
      add_field => { "security_event" => "XSS_BLOCKED" }
      add_field => { "severity" => "HIGH" }
    }
  }
  else if [http.response.status_code] == "404" and [is_lfi_attempt] == true {
    mutate {
      add_field => { "security_event" => "LFI_ATTEMPT" }
      add_field => { "severity" => "MEDIUM" }
    }
  }
  else if [http.response.status_code] == "429" {
    mutate {
      add_field => { "security_event" => "RATE_LIMIT_EXCEEDED" }
      add_field => { "severity" => "LOW" }
    }
  }
}
