# Application log filter configuration
# Parses JSON and text-based application logs

filter {
  if [type] != "application" {
    break
  }

  json {
    source => "message"
    target => "app"
    tag_on_failure => ["_jsonparsefailure"]
  }

  if [app] {
    mutate {
      rename => { "app.timestamp" => "@timestamp" }
      rename => { "app.level" => "log.level" }
      rename => { "app.message" => "message" }
      rename => { "app.user.id" => "user.id" }
      rename => { "app.transaction.id" => "transaction.id" }
    }
  }

  if [app][error] {
    mutate {
      add_tag => ["application_error"]
    }
  }
}
