# Syslog filter configuration
# Parses standard syslog messages and normalizes log fields

filter {
  if [type] != "syslog" {
    break
  }

  grok {
    match => {
      "message" => "%{SYSLOGLINE}"
    }
    tag_on_failure => ["_syslogparsefailure"]
  }

  date {
    match => ["timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
    timezone => "UTC"
  }

  mutate {
    rename => { "host" => "host.name" }
    rename => { "program" => "process.name" }
    rename => { "pid" => "process.pid" }
    rename => { "message" => "syslog.message" }
  }

  if [syslog_severity_code] {
    translate {
      field => "syslog_severity_code"
      destination => "log.level"
      override => true
      dictionary => {
        "0" => "EMERGENCY"
        "1" => "ALERT"
        "2" => "CRITICAL"
        "3" => "ERROR"
        "4" => "WARNING"
        "5" => "NOTICE"
        "6" => "INFO"
        "7" => "DEBUG"
      }
    }
  }
}
