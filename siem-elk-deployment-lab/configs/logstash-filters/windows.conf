# Windows Event log filter configuration
# Processes Winlogbeat JSON output and normalizes fields for security monitoring

filter {
  if [type] != "windows" {
    break
  }

  json {
    source => "message"
    target => "winlog"
    remove_field => ["message"]
  }

  if [winlog] {
    mutate {
      rename => { "winlog.event_id" => "event.code" }
      rename => { "winlog.provider_name" => "event.provider" }
      rename => { "winlog.event_data" => "event_data" }
      rename => { "winlog.computer_name" => "host.name" }
      rename => { "winlog.level" => "log.level" }
      rename => { "winlog.user.name" => "user.name" }
    }
  }

  if [event.code] == "4672" {
    mutate {
      add_field => { "security_event" => "PRIVILEGE_ESCALATION" }
      add_field => { "severity" => "HIGH" }
    }
  }
}
