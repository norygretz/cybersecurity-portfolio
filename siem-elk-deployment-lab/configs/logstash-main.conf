# Main Logstash Pipeline Configuration
# Receives logs from multiple sources and processes them for Elasticsearch

input {
  # Receive logs from Filebeat (port 5044 with TLS)
  beats {
    port => 5044
    ssl => true
    ssl_certificate => "/etc/logstash/certs/logstash.crt"
    ssl_key => "/etc/logstash/private/logstash.key"
    tags => ["beats_input"]
  }

  # Receive Syslog messages (port 5140)
  syslog {
    port => 5140
    codec => plain
    tags => ["syslog_input"]
  }

  # Receive raw TCP messages (port 5000)
  tcp {
    port => 5000
    codec => json
    tags => ["tcp_input"]
  }
}

filter {
  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Route logs by type to appropriate filter
  if [type] == "apache" {
    include "filters/apache.conf"
  }
  else if [type] == "syslog" {
    include "filters/syslog.conf"
  }
  else if [type] == "windows" {
    include "filters/windows.conf"
  }
  else if [type] == "application" {
    include "filters/application.conf"
  }

  # Enrichment filters applied to all logs
  if [source][ip] {
    # GeoIP enrichment
    geoip {
      source => "source.ip"
      target => "geoip"
    }
  }

  # Standard field enrichment
  mutate {
    # Add metadata for index routing
    add_field => { "[@metadata][index]" => "logstash-%{+YYYY.MM.dd}" }
    
    # Add processing timestamp
    add_field => { "processed_at" => "%{@timestamp}" }
    
    # Add environment tag
    add_field => { "environment" => "production" }
  }

  # Remove unnecessary fields to reduce storage
  mutate {
    remove_field => ["[beat][name]", "[beat][hostname]", "[prospector][type]"]
  }
}

output {
  # Primary output to Elasticsearch
  elasticsearch {
    hosts => ["localhost:9200"]
    index => "%{[@metadata][index]}"
    action => "index"
    
    # Authentication
    user => "elastic"
    password => "${ES_PASSWORD}"
    
    # TLS encryption
    ssl => true
    ssl_certificate_verification => true
    cacert => "/etc/logstash/certs/ca.crt"
    
    # Performance tuning
    bulk_size => 1000
    bulk_request_wait_time => 2
  }

  # Debug output (comment out in production)
  # stdout {
  #   codec => rubydebug
  # }

  # Backup failed events to file
  if "_grokparsefailure" in [tags] {
    file {
      path => "/var/log/logstash/failed_events.log"
      codec => json
    }
  }
}
